<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <title>TV Signage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      cursor: none;
    }

    #screen {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: #000;
      opacity: 0;
      transition: opacity 400ms ease;
    }

    img.visible {
      opacity: 1;
    }

    .empty {
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 32px;
      opacity: .8;
      text-align: center;
      padding: 40px;
    }
  </style>
</head>
<body>
  <div id="screen">
    <div class="empty">Nincs feltöltött kép</div>
  </div>

  <script>
    const screen = document.getElementById("screen");
    let images = [];
    let index = 0;
    let intervalMs = 7000;
    let timer = null;

    async function loadImages() {
      try {
        const res = await fetch("/api/images?ts=" + Date.now(), { cache: "no-store" });
        const data = await res.json();
        images = data.images || [];
        intervalMs = data.intervalMs || 7000;
      } catch (e) {
        images = [];
      }
    }

    function showEmpty() {
      screen.innerHTML = '<div class="empty">Nincs feltöltött kép</div>';
    }

    function showNext() {
      if (!images.length) {
        showEmpty();
        return;
      }

      const item = images[index % images.length];
      index++;

      const img = new Image();
      img.onload = () => {
        screen.innerHTML = "";
        screen.appendChild(img);
        requestAnimationFrame(() => img.classList.add("visible"));
      };
      img.src = item.url + "?v=" + Math.round(item.mtime);
    }

    async function start() {
      await loadImages();
      showNext();

      if (timer) clearInterval(timer);

      timer = setInterval(async () => {
        await loadImages();
        showNext();
      }, intervalMs);
    }

    start();
  </script>
</body>
</html>
