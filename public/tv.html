<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>TV Signage</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      cursor: none;
    }

    #screen {
      width: 100vw;
      height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #photo {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: #000;
      display: none;
    }

    #empty {
      color: white;
      font-family: Arial, sans-serif;
      font-size: 32px;
    }
  </style>
</head>
<body>
  <div id="screen">
    <img id="photo" src="">
    <div id="empty">Nincs feltöltött kép</div>
  </div>

  <script>
    var images = [];
    var index = 0;
    var intervalMs = 7000;

    function loadImages(callback) {
      var xhr = new XMLHttpRequest();
      xhr.open("GET", "/api/images?ts=" + new Date().getTime(), true);

      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
          try {
            var data = JSON.parse(xhr.responseText);
            images = data.images || [];
            intervalMs = data.intervalMs || 7000;
          } catch (e) {
            images = [];
          }

          callback();
        }
      };

      xhr.send();
    }

    function showNext() {
      var img = document.getElementById("photo");
      var empty = document.getElementById("empty");

      if (!images.length) {
        img.style.display = "none";
        empty.style.display = "block";
        return;
      }

      empty.style.display = "none";
      img.style.display = "block";

      var item = images[index % images.length];
      index++;

      img.src = item.url + "?v=" + Math.round(item.mtime);
    }

    function tick() {
      loadImages(function () {
        showNext();
      });
    }

    tick();
    setInterval(tick, intervalMs);
  </script>
</body>
</html>
